name: mymart_app
description: "MyMart - E-Commerce Flutter App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  
  # HTTP & API
  http: ^1.2.2
  
  # Local Storage
  shared_preferences: ^2.3.4
  
  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  
  # UI Components
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  carousel_slider: ^5.0.0
  badges: ^3.1.2
  
  # Payment
  flutter_stripe: ^11.4.0
  
  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.1
  google_fonts: ^8.1.0
  connectivity_plus: ^6.0.5

  # Location & Maps
  geolocator: ^13.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Permissions
  permission_handler: ^11.3.1

  # Notifications
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
